services:
  api:
    build: ./expert-enigma-api
    ports:
      - "8080:8080"
    depends_on:
      - ollama
      - db
    env_file:
      - ./expert-enigma-api/.env

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cvdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
    - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    
volumes:
  ollama_data: